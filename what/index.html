<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clippy</title>

<link rel="stylesheet" href="https://www.smore.com/clippy/build/clippy.css">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}
</style>
</head>
<body>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://www.smore.com/clippy/build/clippy.min.js"></script>

<script>
clippy.load("Clippy", function(agent) {

    agent.show();

    agent.moveTo(
        window.innerWidth / 2 - 80,
        window.innerHeight / 2 - 120
    );

    setTimeout(function() {

        agent.speak("Somethin' tells me this is deeper");

        setTimeout(function() {

            agent.moveTo(
                window.innerWidth + 300,
                window.innerHeight / 2
            );

        }, 3000);

    }, 500);

});
</script>

</body>
</html>
