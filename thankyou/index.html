<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>
@font-face {
    font-family: "Deltarune";
    src: url("deltarune.ttf") format("truetype");
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

h1 {
    font-family: "Deltarune", "Comic Sans MS", sans-serif;
    color: white;
    font-size: clamp(18px, 3vw, 42px);
    font-weight: normal;
    text-align: center;
    text-shadow:
        0 0 6px rgba(255,255,255,0.35),
        0 0 18px rgba(255,255,255,0.15);
    margin: 20px;
    user-select: none;
}

/* Invisible clickable "secret" */
.secret {
    position: fixed;
    top: 2vw;
    right: 2vw;

    width: clamp(80px, 10vw, 140px);
    height: clamp(20px, 2.5vw, 30px);

    font-size: clamp(10px, 1vw, 14px);
    font-family: Arial, sans-serif;
    color: #000;          /* Black on black */
    background: transparent;
    text-decoration: none;
    overflow: hidden;
    white-space: nowrap;
}

/* Shows when selected */
.secret::selection {
    background: white;
    color: black;
}
.secret::-moz-selection {
    background: white;
    color: black;
}
</style>
</head>

<body>

<h1>Are you trying to find secrets?</h1>

<a class="secret" href="https://wethegoobers.wiki/404">
    Really?
</a>

</body>
</html>
