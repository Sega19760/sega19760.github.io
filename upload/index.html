<!DOCTYPE html>
<html>
<body>

<input type="file" id="f">
<button onclick="upload()">Upload</button>

<p id="status"></p>

<script>

async function upload() {

    try {

        let file = document.getElementById("f").files[0];

        console.log(file);

        let fd = new FormData();

        fd.append("file", file);

        let r = await fetch("http://localhost:5000/upload", {
            method: "POST",
            body: fd
        });

        let text = await r.text();

        console.log(text);

        document.getElementById("status").innerHTML =
            `<a href="${text}">${text}</a>`;

    } catch(e) {

        console.error(e);

        document.getElementById("status").innerText = e;

    }

}

</script>

</body>
</html>
