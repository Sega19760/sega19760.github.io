<!DOCTYPE html>
<html>
<body>

<input type="file" id="f">
<button onclick="upload()">Upload</button>

<p id="status"></p>

<script>
function upload() {

    let file = document.getElementById("f").files[0];

    if (!file) {
        document.getElementById("status").innerText = "Select a file first.";
        return;
    }

    let filename = file.name;
    let basename = filename.replace(/\.[^/.]+$/, "").toLowerCase();

    let status = document.getElementById("status");

    if (basename === "index") {
        status.innerHTML = `<a href="http://wethegoobers.wiki/fun">You think you're funny?</a>`;
    }
    else if (basename === "angela") {
        status.innerHTML = `<a href="#">Oh you mother-</a>`;
    }
    else if (basename === "oofer") {
        status.innerHTML = `<a href="http://wethegoobers.wiki/oofercompany">Oh that guy?</a>`;
    }
    else if (basename === "lord x") {
        status.innerHTML = `<a href="http://wethegoobers.wiki/sinister">Well, they said I needed a stronger password.</a>`;
    }
    else if (basename === "alex") {
        status.innerHTML = `<a href="http://wethegoobers.wiki/alex">alex? yeah you can come in</a>`;
    }
    else {
        status.innerText = "Uploaded";
    }

}
</script>

</body>
</html>
