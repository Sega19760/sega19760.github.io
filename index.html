<!DOCTYPE html><html>
<head>
  <title>Goobers Wiki</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
    }.topbar {
  background-color: white;
  border-bottom: 1px solid #a2a9b1;
  padding: 10px;
  font-size: 20px;
  font-weight: bold;
}

.content {
  padding: 20px;
  background-color: white;
  max-width: 900px;
  margin: auto;
}

a {
  color: #0645ad;
  text-decoration: none;
  display: block;
  margin: 10px 0;
}

  </style>
</head><body><div class="topbar">Goobers Wiki</div><div class="content">
  <h1>Main Page</h1>
  <p>Welcome to the oofer bullying centre</p>  <h2>Articles</h2>
  <div id="articles"></div>
</div><script>
  const pages = [
    "issac.html",
    "pak_attak.html",
    "toby.html",
    "oofer.html"
  ];

  const container = document.getElementById("articles");

  pages.forEach(page => {
    if (page !== "index.html") {
      const link = document.createElement("a");
      link.href = page;

      // Make name nicer (remove .html)
      link.textContent = page.replace(".html", "");

      container.appendChild(link);
    }
  });
</script></body>
</html>
