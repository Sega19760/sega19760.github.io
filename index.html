<!DOCTYPE html><html>
<head>
  <title>Goobers Wiki</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f6f6f6;
    }.topbar {
  background-color: white;
  border-bottom: 1px solid #a2a9b1;
  padding: 10px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  display: flex;
}

.sidebar {
  width: 200px;
  background-color: #f8f9fa;
  border-right: 1px solid #a2a9b1;
  padding: 10px;
  height: 100vh;
}

.sidebar a {
  display: block;
  color: #0645ad;
  margin: 5px 0;
  text-decoration: none;
  cursor: pointer;
}

.content {
  flex: 1;
  padding: 20px;
  background-color: white;
}

h1 {
  border-bottom: 1px solid #a2a9b1;
  font-weight: normal;
}

  </style>
</head>
<body><div class="topbar">Goobers Wiki</div><div class="container">  <div class="sidebar" id="sidebar">
    <h3>Articles</h3>
  </div>  <div class="content">
    <h1 id="title">Main Page</h1>
    <div id="article">Select a page from the left.</div>
  </div></div><script>
  const pages = [
    "issac",
    "pak_attak",
    "toby",
    "oofer"
  ];

  const sidebar = document.getElementById("sidebar");
  const articleDiv = document.getElementById("article");
  const title = document.getElementById("title");

  // Create sidebar links
  pages.forEach(page => {
    const link = document.createElement("a");
    link.textContent = page.replace(/_/g, " ");
    link.onclick = () => loadPage(page);
    sidebar.appendChild(link);
  });

  // Load article
  function loadPage(page) {
    fetch(page + ".txt")
      .then(res => res.text())
      .then(text => {
        title.textContent = page.replace(/_/g, " ");
        articleDiv.innerHTML = text;
      })
      .catch(() => {
        articleDiv.innerHTML = "Page not found.";
      });
  }
</script></body>
</html>
