<!DOCTYPE html><html>
<head>
  <title>We The Goobers Wiki</title>  <!-- Mobile scaling -->  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
    }

    .banner {
      position: relative;
      height: 200px;
      background-size: cover;
      background-position: center;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }

    .banner-title {
      position: absolute;
      bottom: 15px;
      left: 15px;
      font-size: 28px;
      font-weight: bold;
      z-index: 1;
    }

    /* Layout */
    .container {
      display: flex;
      gap: 20px;
      padding: 15px;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      background: #1a1a1a;
      padding: 10px;
      border-radius: 10px;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .sidebar a {
      display: block;
      color: #4ea3ff;
      margin: 6px 0;
      text-decoration: none;
      cursor: pointer;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    h1 {
      margin-top: 0;
    }

    img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* 📱 MOBILE FIX */
    @media (max-width: 700px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .banner {
        height: 150px;
      }

      .banner-title {
        font-size: 22px;
      }
    }
  </style></head><body><div class="banner" id="banner">
  <div class="banner-title">We The Goobers Wiki</div>
</div><div class="container">  <div class="sidebar" id="sidebar">
    <h3>Articles</h3>
  </div>  <div class="content" id="contentBox">
    <h1 id="title">Main Page</h1>
    <div id="article">Select a page.</div>
  </div></div><script>
  const pages = {

    wtg_drama: {
  title: "WTG Drama",
  file: "wtg_drama.txt",
  banner: "yourimage.png",
  color: "#3a1a1a"
    },

    Tauntful: {
      title: "Tauntful",
      file: "alex.txt",
      banner: "8d7c28a465444cb0c37c3c050a274d87.webp",
      color: "#01c119"
    },

    issac: {
      title: "Issac get outta there",
      file: "issac.txt",
      banner: "image-3.png",
      color: "#2a0d2a"
    },

    oofer: {
      title: "Oofer",
      file: "oofer.txt",
      banner: "image-2.png",
      color: "#2a0d0d"
  },

    pak_attak: {
      title: "pak attak",
      file: "pak_attak.txt",
      banner: "IMG_8739.png",
      color: "#a4fffd"
    },

      toby: {
      title: "Toby",
      file: "toby.txt",
      banner: "image.jpg",
      color: "#0d2a2a"
      }
    };

  const sidebar = document.getElementById("sidebar");
  const articleDiv = document.getElementById("article");
  const title = document.getElementById("title");
  const banner = document.getElementById("banner");
  const contentBox = document.getElementById("contentBox");

  // Create sidebar links
  Object.keys(pages).forEach(key => {
    const link = document.createElement("a");
    link.textContent = pages[key].title;
    link.onclick = () => loadPage(key);
    sidebar.appendChild(link);
  });

  // Load page
  function loadPage(key) {
    const page = pages[key];

    // Change banner
    banner.style.backgroundImage = `url("${page.banner}")`;

    // Change theme color
    contentBox.style.background = page.color;

    // Set title
    title.textContent = page.title;

    // Load content (no cache)
    fetch(page.file + "?v=" + Date.now())
      .then(res => res.text())
      .then(text => {
        articleDiv.innerHTML = text;
      })
      .catch(() => {
        articleDiv.innerHTML = "Page not found.";
      });
  }
</script></body>
</html>
