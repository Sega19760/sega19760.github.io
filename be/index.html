<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What could it be?</title>
    <style>
        @font-face {
            font-family: 'Merriweather';
            src: url('Merriweather.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: black; 
            color: white; 
            font-family: 'Merriweather', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Container & Layers */
        #video-container {
            position: relative;
            width: 1280px;
            height: 720px;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            border: 2px solid #222;
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
        }

        #bg-middle { background-image: url('https://i.imgur.com/lsCiQm1.png'); z-index: 1; }
        #bg-start { background-image: url('https://i.imgur.com/MGd0U8B.png'); z-index: 2; }
        #bg-final { background-image: url('https://i.imgur.com/e5BCbUe.png'); z-index: 3; opacity: 0; }

        /* UI & Lyrics */
        #lyrics-wrapper { position: absolute; bottom: 30px; width: 90%; display: flex; justify-content: center; z-index: 10; }
        #lyrics-display { font-size: 46px; text-align: center; white-space: nowrap; color: #555; text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5); }
        .lit { color: white !important; text-shadow: 2px 2px 4px black; }

        #play-btn { position: absolute; z-index: 20; padding: 15px 30px; font-size: 20px; background-color: rgba(255,0,0,0.7); color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="video-container">
    <div id="bg-middle" class="layer"></div>
    <div id="bg-start" class="layer"></div>
    <div id="bg-final" class="layer"></div>

    <div id="lyrics-wrapper">
        <div id="lyrics-display"></div>
    </div>

    <button id="play-btn">Play Scene</button>

    <audio id="music" preload="auto">
        <source src="What could it be.mp3" type="audio/mpeg">
    </audio>
</div>

        { lineStartTime: 44195, flash: false, chunks: [{ text: "Bo", time: 44195 }, { text: "dy ", time: 44310 }, { text: "bags ", time: 44622 }, { text: "that ", time: 44789 }, { text: "co", time: 45039 }, { text: "ver ", time: 45176 }, { text: "corp", time: 45429 }, { text: "ses", time: 45796 }, { text: " ", time: 46264 }] },

        { lineStartTime: 50739, flash: false, chunks: [{ text: "I ", time: 50739 }, { text: "could", time: 50859 }, { text: "n't ", time: 50964 }, { text: "see.. ", time: 51204 }, { text: "I ", time: 52609 }, { text: "could", time: 52845 }, { text: "n't've ", time: 52956 }, { text: "seen ", time: 53241 }, { text: "it!", time: 53916 }, { text: " ", time: 54642 }] },
        { lineStartTime: 54731, flash: true, chunks: [{ text: "There's ", time: 54731 }, { text: "no", time: 54978 }, { text: "thin' ", time: 55084 }, { text: "left, ", time: 55386 }, { text: "but ", time: 56007 }, { text: "I ", time: 56263 }, { text: "can't ", time: 56521 }, { text: "just ", time: 56781 }, { text: "leave ", time: 57063 }, { text: "her ", time: 57337 }, { text: "be, ", time: 57613 }, { text: "no!", time: 58127 }, { text: " ", time: 58856 }] },
        { lineStartTime: 58960, flash: false, chunks: [{ text: "You ", time: 58960 }, { text: "cast ", time: 59176 }, { text: "your ", time: 59428 }, { text: "sight ", time: 59683 }, { text: "on ", time: 59961 }, { text: "dreams ", time: 60225 }, { text: "to ", time: 60485 }, { text: "fer", time: 60741 }, { text: "ry ", time: 61000 }, { text: "‘fore ", time: 61276 }, { text: "you ", time: 61521 }, { text: "count ", time: 61791 }, { text: "all ", time: 62063 }, { text: "your ", time: 62334 }, { text: "coins", time: 62594 }, { text: " ", time: 63025 }] },
        { lineStartTime: 63126, flash: false, chunks: [{ text: "O", time: 63126 }, { text: "thers ", time: 63375 }, { text: "will ", time: 63624 }, { text: "com", time: 63892 }, { text: "fort ", time: 64134 }, { text: "say", time: 64398 }, { text: "ing ", time: 64658 }, { text: "they’ve ", time: 64913 }, { text: "seen ", time: 65172 }, { text: "hell ", time: 65436 }, { text: "and ", time: 65539 }, { text: "back ", time: 65819 }, { text: "— ", time: 66221 }, { text: "Oh ", time: 66323 }, { text: "real", time: 66487 }, { text: "ly?", time: 66759 }, { text: " ", time: 67161 }] },

        { lineStartTime: 71529, flash: true, chunks: [{ text: "I ", time: 71529 }, { text: "should’ve ", time: 71736 }, { text: "stopped ", time: 71874 }, { text: "be", time: 72127 }, { text: "fore ", time: 72716 }, { text: "I ", time: 72809 }, { text: "star", time: 73072 }, { text: "ted, ", time: 73404 }, { text: "and ", time: 73686 }, { text: "thought — ", time: 73992 }, { text: "“How ", time: 74436 }, { text: "sil", time: 74548 }, { text: "ly!”", time: 74862 }, { text: " ", time: 76565 }] },
        { lineStartTime: 76841, flash: false, chunks: [{ text: "What ", time: 76841 }, { text: "could ", time: 76957 }, { text: "it ", time: 77084 }, { text: "be?", time: 77342 }, { text: "What ", time: 78743 }, { text: "could ", time: 78984 }, { text: "it ", time: 79095 }, { text: "be!?", time: 79348 }, { text: " ", time: 80796 }] },
        { lineStartTime: 80949, flash: true, chunks: [{ text: "I ", time: 80949 }, { text: "JUST ", time: 81104 }, { text: "CAN'T ", time: 81302 }, { text: "TAKE ", time: 81580 }, { text: "IT ", time: 81853 }, { text: "A", time: 82130 }, { text: "NY", time: 82399 }, { text: "MORE!", time: 82681 }, { text: " ", time: 83127 }] }
    ];

document.getElementById('play-btn').onclick = async function () {

    this.remove();

    // Start the music from the beginning
    music.currentTime = 0;

    try {
        await music.play();
    } catch (err) {
        console.error(err);
    }

    const t0 = performance.now();

    requestAnimationFrame(function loop(now) {

        // Use the audio's actual playback time
        const t = music.currentTime;
        const ms = t * 1000;

        // Lyrics Logic
        const line = lyricTimeline.find((l, i) =>
            ms >= l.lineStartTime &&
            (lyricTimeline[i + 1] ? ms < lyricTimeline[i + 1].lineStartTime : true)
        );

        if (line) {
            let html = "";

            line.chunks.forEach(c => {
                html += `<span class="${ms >= c.time ? "lit" : ""}">${c.text}</span>`;
            });

            display.innerHTML = html;
        } else {
            display.innerHTML = "";
        }

        // Background Layer Logic
        if (t <= 2)
            s.style.opacity = 1;
        else if (t <= 9)
            s.style.opacity = 1 - (t - 2) / 7;
        else
            s.style.opacity = 0;

        let o;

        if (t < 17)
            o = 0;
        else if (t < 18)
            o = t - 17;
        else if (t < 130.934)
            o = 1;
        else if (t < 131.934)
            o = 1 - (t - 130.934);
        else if (t < 151.004)
            o = 0;
        else if (t < 152.004)
            o = t - 151.004;
        else
            o = 1;

        f.style.opacity = Math.max(0, Math.min(1, o));

        // Keep updating until the song ends
        if (!music.paused && !music.ended) {
            requestAnimationFrame(loop);
        }
    });
};
</script>
</body>
</html>
