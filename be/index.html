    document.getElementById('play-btn').onclick = async function () {
        this.remove();
        music.currentTime = 0;
        await music.play();

        function loop() {
            const t = music.currentTime;
            const ms = t * 1000;

            const line = lyricTimeline.find((l, i) => 
                ms >= l.lineStartTime && (lyricTimeline[i + 1] ? ms < lyricTimeline[i + 1].lineStartTime : true)
            );

            if (line) {
                let html = "";
                line.chunks.forEach(c => {
                    html += `<span class="${ms >= c.time ? "lit" : ""}">${c.text}</span>`;
                });
                display.innerHTML = html;
                fitLyrics();
            }

            // Background Opacity logic
            if (t <= 2) s.style.opacity = 1;
            else if (t <= 9) s.style.opacity = 1 - (t - 2) / 7;
            else s.style.opacity = 0;

            let o = 0;
            if (t >= 17 && t < 18) o = t - 17;
            else if (t >= 18 && t < 130.934) o = 1;
            else if (t >= 130.934 && t < 131.934) o = 1 - (t - 130.934);
            else if (t >= 151.004 && t < 152.004) o = t - 151.004;
            else if (t >= 152.004) o = 1;
            f.style.opacity = Math.max(0, Math.min(1, o));

            if (!music.paused && !music.ended) requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    };
