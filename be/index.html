    /* --- REDGLOVE DUST EFFECT CLASSES --- */
@keyframes dustIn {
    0% {
        opacity: 0;
        filter: blur(15px) contrast(200%) brightness(150%);
        transform: scale(0.4) translateY(30px);
    }
    100% {
        opacity: 1;
        filter: blur(0px) contrast(100%) brightness(100%);
        transform: scale(0.4) translateY(0px);
    }
}

@keyframes dustOut {
    0% {
        opacity: 1;
        filter: blur(0px) contrast(100%) brightness(100%);
        transform: scale(0.4) translateY(0px);
    }
    100% {
        opacity: 0;
        filter: blur(15px) contrast(200%) brightness(150%);
        transform: scale(0.4) translateY(-30px);
    }
}

.dust-appear {
    animation: dustIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
}

.dust-vanish {
    animation: dustOut 0.4s ease-in forwards !important;
}



     @keyframes stretchBounce {
    /* 0%: The SNAP (Start at full stretch) */
    0% { transform: scaleY(1.1); } 
    
   
    /* 30-50%: The secondary "little bounce" (The 40% stretch) */
    50% { transform: scaleY(1.04); } 
    
    /* 50-75%: Settle back to normal */
    75% { transform: scaleY(1); }
    
    /* 75-100%: Freeze/Hold */
    100% { transform: scaleY(1); }
}

#faker-gif {
    transform-origin: center;
    /* 1s total: 0.75s active motion, 0.25s freeze */
    /* This cubic-bezier is the secret: it makes the "snap" feel aggressive */
    animation: stretchBounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
}

// --- DEBUGGER SETUP ---
let isDraggingSlider = false;

// Toggle Scrubber visibility with 'P' key
window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'p') {
        const scrubber = document.getElementById('debug-scrubber');
        if (scrubber) {
            scrubber.style.display = scrubber.style.display === 'none' ? 'block' : 'none';
        }
    }
});

// Bind slider dragging to audio currentTime
setTimeout(() => {
    const slider = document.getElementById('timeline-slider');
    if (slider) {
        slider.addEventListener('mousedown', () => isDraggingSlider = true);
        slider.addEventListener('touchstart', () => isDraggingSlider = true);
        
        slider.addEventListener('mouseup', () => isDraggingSlider = false);
        slider.addEventListener('touchend', () => isDraggingSlider = false);
        
        slider.addEventListener('input', (e) => {
            if (music && music.duration) {
                music.currentTime = parseFloat(e.target.value);
            }
        });
    }
}, 500);

// Helper function to update the UI every frame
function updateScrubberUI() {
    const scrubber = document.getElementById('debug-scrubber');
    const slider = document.getElementById('timeline-slider');
    const label = document.getElementById('timeline-label');
    
    if (scrubber && scrubber.style.display !== 'none' && music && music.duration) {
        // Only update slider position if you aren't actively clicking/dragging it
        if (!isDraggingSlider) {
            slider.max = music.duration;
            slider.value = music.currentTime;
        }
        
        // Format MM:SS.xx and exact milliseconds
        const mins = Math.floor(music.currentTime / 60).toString().padStart(2, '0');
        const secs = (music.currentTime % 60).toFixed(2).padStart(5, '0');
        const msExact = Math.floor(music.currentTime * 1000);
        
        label.innerText = `${mins}:${secs} / ${(music.duration / 60).toFixed(2)} mins | EXACT TIME: ${msExact} ms`;
    }
}

            if (t >= 17 && t < 18) o = t - 17;

            else if (t >= 132.788 && t < 133.788) o = 1 - (t - 132.788); 
            else if (t >= 151.004 && t < 152.004) o = t - 151.004;
            else if (t >= 152.004) o = 1;
            f.style.opacity = Math.max(0, Math.min(1, o));
        }

        // Ensure the double red text layer is explicitly hidden!
        displayRed.style.display = "none";
    }

        if (ms > 4500 && ms < 67999) {
            if (lordX.style.transition !== "none") lordX.style.transition = "none";
            lordX.style.opacity = "1";
        }

        // 2. THE BREAK FADE-OUT (67999 ms to 81816 ms)
        else if (ms >= 67999 && ms < 81816) {
            lordX.style.transition = "opacity 1s ease";

        }

        else if (ms >= 81816 && ms < 121323) {
            lordX.style.transition = "opacity 1s ease";
            lordX.style.opacity = "1";
        }

        // --- THE SNAPPY REDGLOVE SECTION ---
        // 4. "Just " -> Top 33% Redglove reveal
        else if (ms >= 121323 && ms < 121533) {

            redglove.style.transition = "none";

            redglove.style.opacity = "1";

            redglove.style.clipPath = "inset(0 0 67% 0)";
            lordX.style.clipPath = "inset(33% 0 0 0)";
        }

            redglove.style.opacity = "0";
