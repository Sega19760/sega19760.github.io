<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waiting for audio...</title>
<style>
    /* Reset and base setup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Times New Roman', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Video Container */
    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        background: black url("https://media.discordapp.net/attachments/1478247102478946456/1522458331590168698/image.png") no-repeat center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; 
    }

    /* Glowing red core that pulses */
    .core-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 150px; height: 150px;
        background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        z-index: 2;
        opacity: 0;
        transition: opacity 0.1s;
    }
    
    .pulse {
        animation: heartbeat 0.5s infinite alternate;
    }

    @keyframes heartbeat {
        from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Lyrics display at the bottom */
    #lyrics-display {
        position: absolute;
        bottom: 80px;
        z-index: 10;
        font-size: 42px;
        text-align: center;
        width: 100%;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
    }

    /* Specific text colors used in the video */
    .color-blue { color: #88ccff; text-shadow: 0 0 8px #88ccff, 2px 2px 4px black; }
    .color-red { color: #ff3333; text-shadow: 0 0 8px #ff3333, 2px 2px 4px black; }
    
    /* Play Button */
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: none;
    }
    #play-btn:hover { background-color: red; }

    /* DEBUG PANEL STYLES */
    #debug-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 100;
        background-color: rgba(0, 0, 0, 0.85);
        border: 2px solid #555;
        padding: 15px;
        border-radius: 8px;
        font-family: sans-serif;
        display: none; /* Hidden until API loads */
        flex-direction: column;
        gap: 10px;
        width: 350px;
    }
    #debug-panel h3 { margin: 0; color: #ff3333; }
    #sync-status { font-size: 16px; font-weight: bold; color: yellow; }
    #export-area {
        width: 100%;
        height: 150px;
        background: #111;
        color: #0f0;
        font-family: monospace;
        border: 1px solid #444;
        display: none;
    }
    .debug-btn {
        padding: 8px;
        background: #333;
        color: white;
        border: 1px solid #666;
        cursor: pointer;
    }
    .debug-btn:hover { background: #555; }
    
    /* Hide the actual YouTube iframe */
    #ytplayer {
        position: absolute;
        top: -9999px;
        left: -9999px;
        width: 1px;
        height: 1px;
    }

</style>
</head>
<body>

<div id="video-container">
    <div id="ytplayer"></div>

    <div id="debug-panel">
        <h3>Sync Tool</h3>
        <button id="start-sync-btn" class="debug-btn">1. Start Sync Mode (Plays from 30s)</button>
        <div id="sync-status">Status: Waiting to start...</div>
        <button id="export-btn" class="debug-btn" style="display:none;">2. Export Updated Code</button>
        <textarea id="export-area"></textarea>
    </div>

    <div id="glow" class="core-glow"></div>
    <div id="lyrics-display"></div>
    <button id="play-btn">Loading Audio...</button>
</div>

<script>
    // Original timeline (used for standard playback)
    const lyricTimeline = [
        { time: 0, text: "", flash: false },
        { time: 33000, text: "Tectonic tribulations", flash: true },
        { time: 34500, text: "Sickness that sweeps the nations", flash: false },
        { time: 36000, text: "Beyond these tiny things just", flash: false },
        { time: 37500, text: "Somethin' tells me this is deeper", flash: true },
        { time: 39000, text: "Our minds are <span class='color-blue'>special forces</span>", flash: false },
        { time: 40500, text: "Body bags that cover corpses", flash: false },
        { time: 42000, text: "Let it make some sense to me that", flash: true },
        { time: 43500, text: "There's a reason I couldn't keep her", flash: false },
        { time: 45000, text: "I couldn't see...", flash: false },
        { time: 46500, text: "I couldn't've seen it!", flash: true },
        { time: 48000, text: "There's nothin' left, but", flash: false },
        { time: 49000, text: "I can't just leave her be, no!", flash: false },
        { time: 50500, text: "You cast <span class='color-blue'>your sight</span> on dreams", flash: true },
        { time: 52000, text: "to ferry 'fore you count all your coins", flash: false },
        { time: 53500, text: "Others will <span class='color-blue'>comfort</span> saying", flash: false },
        { time: 55000, text: "they've seen hell and back - Oh really?", flash: true },
        { time: 57000, text: "Well in this game of glee", flash: false },
        { time: 58500, text: "Turns out the <span class='color-red'>losers</span> make them always", flash: false },
        { time: 60500, text: "", flash: false }
    ];

    const playBtn = document.getElementById('play-btn');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const glow = document.getElementById('glow');
    
    // Debug variables
    let isSyncMode = false;
    let syncIndex = 1; // Start at index 1 (skipping the empty string at index 0)
    let newTimeline = [];

    let player;
    let animationFrame;

    // --- YOUTUBE API SETUP ---
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
            height: '1',
            width: '1',
            videoId: '6fk50hiAYTQ',
            playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        document.title = "Ready to Play";
        playBtn.style.display = 'block';
        playBtn.innerText = "Start Standard Video";
        document.getElementById('debug-panel').style.display = 'flex'; // Show debug tools
        
        // Standard Play Button
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            document.title = "Playing...";
            player.seekTo(30); 
            player.playVideo();
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING && !isSyncMode) {
            updateFrame(); // Only run standard animation if NOT in sync mode
        } else if (event.data == YT.PlayerState.ENDED || event.data == YT.PlayerState.PAUSED) {
            cancelAnimationFrame(animationFrame);
            if (event.data == YT.PlayerState.ENDED && !isSyncMode) {
                playBtn.style.display = 'block';
                playBtn.innerText = "Replay Video";
                lyricsDisplay.innerHTML = "";
                document.title = "Scene Ended";
                glow.style.opacity = '0';
            }
        }
    }

    // --- ANIMATION SYNC LOOP (Standard Playback) ---
    function updateFrame() {
        const currentTime = player.getCurrentTime() * 1000;
        
        let currentLine = lyricTimeline[0];
        for (let i = lyricTimeline.length - 1; i >= 0; i--) {
            if (currentTime >= lyricTimeline[i].time) {
                currentLine = lyricTimeline[i];
                break;
            }
        }

        lyricsDisplay.innerHTML = currentLine.text;
        
        if (currentLine.text === "") {
            document.title = "Lord X";
        } else {
            const cleanText = currentLine.text.replace(/<[^>]*>?/gm, '');
            document.title = cleanText;
        }
        
        if (currentLine.flash) glow.classList.add('pulse');
        else { glow.classList.remove('pulse'); glow.style.opacity = '0'; }

        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            animationFrame = requestAnimationFrame(updateFrame);
        }
    }

    // --- DEBUG & SYNC LOGIC ---

    // 1. Start Syncing
    document.getElementById('start-sync-btn').addEventListener('click', () => {
        isSyncMode = true;
        syncIndex = 1; 
        
        // Create a deep copy of the timeline to edit
        newTimeline = JSON.parse(JSON.stringify(lyricTimeline));
        
        // Reset the text on screen so it doesn't distract
        lyricsDisplay.innerHTML = ""; 
        playBtn.style.display = 'none';
        
        document.getElementById('sync-status').innerHTML = `Press Space for:<br>"${newTimeline[syncIndex].text.replace(/<[^>]*>?/gm, '')}"`;
        document.getElementById('export-btn').style.display = 'none';
        document.getElementById('export-area').style.display = 'none';

        // Start video at 30 seconds
        player.seekTo(30);
        player.playVideo();
    });

    // 2. Spacebar Event Listener
    window.addEventListener('keydown', (e) => {
        // Only trigger if we are in sync mode, playing, and pressed Space
        if (e.code === 'Space' && isSyncMode) {
            e.preventDefault(); // Stop page from scrolling down

            // Grab exact current time
            const exactTimeMs = Math.round(player.getCurrentTime() * 1000);
            
            // Record time for current lyric
            newTimeline[syncIndex].time = exactTimeMs;
            
            // Flash red on screen just so you know you hit the button
            document.body.style.backgroundColor = '#300';
            setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 100);

            // Move to next lyric
            syncIndex++;

            if (syncIndex < newTimeline.length) {
                // Update debug text to show what's coming next
                let nextText = newTimeline[syncIndex].text.replace(/<[^>]*>?/gm, '');
                if (nextText === "") nextText = "[END SCENE]";
                document.getElementById('sync-status').innerHTML = `Press Space for:<br>"${nextText}"`;
            } else {
                // We finished all the lyrics!
                document.getElementById('sync-status').innerHTML = `Sync Complete!`;
                player.pauseVideo();
                isSyncMode = false;
                document.getElementById('export-btn').style.display = 'block';
            }
        }
    });

    // 3. Export Code
    document.getElementById('export-btn').addEventListener('click', () => {
        let output = "const lyricTimeline = [\n";
        
        newTimeline.forEach((line, index) => {
            const isLast = index === newTimeline.length - 1;
            // Reconstruct the JSON string properly
            output += `    { time: ${line.time}, text: "${line.text}", flash: ${line.flash} }${isLast ? '' : ','}\n`;
        });
        
        output += "];";
        
        const textArea = document.getElementById('export-area');
        textArea.value = output;
        textArea.style.display = 'block';
        textArea.select();
    });

</script>
</body>
</html>
