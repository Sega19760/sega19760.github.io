<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric Video Recreation</title>
<style>
    /* Reset and base setup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Times New Roman', serif; /* Matching the serif font in the video */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Video Container */
    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        background-color: black;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; /* Just to see the bounds on a large monitor */
    }

    /* Fake cracked glass background effect using CSS borders and pseudo-elements */
    .cracks {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1;
        /* A simple radial gradient to simulate the center hole */
        background: radial-gradient(circle at center, transparent 10%, black 15%), 
                    repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(255,255,255,0.05) 100px, rgba(255,255,255,0.05) 102px);
    }

    /* Glowing red core that pulses */
    .core-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 150px; height: 150px;
        background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        z-index: 2;
        opacity: 0;
        transition: opacity 0.1s;
    }
    
    .pulse {
        animation: heartbeat 0.5s infinite alternate;
    }

    @keyframes heartbeat {
        from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Character Sprite Placeholder */
    #character {
        position: absolute;
        top: 40%; left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 400px;
        /* Using a CSS shape to represent the Sonic/Lord X silhouette */
        background-color: #1a2a3a;
        clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
        z-index: 3;
        border: 2px solid #555;
        display: none; /* Starts hidden, appears when lyrics start */
    }

    /* Eye glow for the character */
    .eye {
        position: absolute;
        top: 30%; left: 60%;
        width: 15px; height: 15px;
        background-color: red;
        border-radius: 50%;
        box-shadow: 0 0 10px red;
    }

    /* Lyrics display at the bottom */
    #lyrics-display {
        position: absolute;
        bottom: 80px;
        z-index: 10;
        font-size: 42px;
        text-align: center;
        width: 100%;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
    }

    /* Specific text colors used in the video */
    .color-blue { color: #88ccff; text-shadow: 0 0 8px #88ccff, 2px 2px 4px black; }
    .color-red { color: #ff3333; text-shadow: 0 0 8px #ff3333, 2px 2px 4px black; }
    
    /* Play Button */
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }
    #play-btn:hover { background-color: red; }

</style>
</head>
<body>

<div id="video-container">
    <div class="cracks"></div>
    <div id="glow" class="core-glow"></div>
    
    <div id="character">
        <div class="eye"></div>
    </div>

    <div id="lyrics-display"></div>
    
    <button id="play-btn">Start Lyric Scene</button>
</div>
