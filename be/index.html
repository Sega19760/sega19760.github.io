<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What could it be?</title>
<style>
    /* Reset and base setup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Times New Roman', serif; /* Matching the serif font in the video */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Video Container */
    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        /* Updated: Set the background image and remove the solid black background */
        background: black url("https://media.discordapp.net/attachments/1478247102478946456/1522458331590168698/image.png") no-repeat center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; /* Just to see the bounds on a large monitor */
    }

    /* REMOVED: .cracks effect */
    /* REMOVED: #character sprite and related styles */
    /* REMOVED: .eye styles */

    /* Glowing red core that pulses (Still present to integrate with the new scene) */
    .core-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 150px; height: 150px;
        background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        z-index: 2;
        opacity: 0;
        transition: opacity 0.1s;
    }
    
    .pulse {
        animation: heartbeat 0.5s infinite alternate;
    }

    @keyframes heartbeat {
        from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Lyrics display at the bottom */
    #lyrics-display {
        position: absolute;
        bottom: 80px;
        z-index: 10;
        font-size: 42px;
        text-align: center;
        width: 100%;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
    }

    /* Specific text colors used in the video */
    .color-blue { color: #88ccff; text-shadow: 0 0 8px #88ccff, 2px 2px 4px black; }
    .color-red { color: #ff3333; text-shadow: 0 0 8px #ff3333, 2px 2px 4px black; }
    
    /* Play Button */
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }
    #play-btn:hover { background-color: red; }

</style>
</head>
<body>

<div id="video-container">
    <div id="glow" class="core-glow"></div>
    
    <div id="lyrics-display"></div>
    
    <button id="play-btn">Start Lyric Scene</button>
</div>

<script>
    // 1. Define the timeline (Timestamp in milliseconds, Text, and if the screen flashes red)
    // I am using the exact text formatting and highlights from the video frames.
    // MODIFIED: 'showChar' is set to false for all entries.
    const lyricTimeline = [
        { time: 0, text: "", flash: false, showChar: false },
        { time: 1000, text: "Tectonic tribulations", flash: true, showChar: false },
        { time: 2500, text: "Sickness that sweeps the nations", flash: false, showChar: false },
        { time: 4000, text: "Beyond these tiny things just", flash: false, showChar: false },
        { time: 5500, text: "Somethin' tells me this is deeper", flash: true, showChar: false },
        { time: 7000, text: "Our minds are <span class='color-blue'>special forces</span>", flash: false, showChar: false },
        { time: 8500, text: "Body bags that cover corpses", flash: false, showChar: false },
        { time: 10000, text: "Let it make some sense to me that", flash: true, showChar: false },
        { time: 11500, text: "There's a reason I couldn't keep her", flash: false, showChar: false },
        { time: 13000, text: "I couldn't see...", flash: false, showChar: false },
        { time: 14500, text: "I couldn't've seen it!", flash: true, showChar: false },
        { time: 16000, text: "There's nothin' left, but", flash: false, showChar: false },
        { time: 17000, text: "I can't just leave her be, no!", flash: false, showChar: false },
        { time: 18500, text: "You cast <span class='color-blue'>your sight</span> on dreams", flash: true, showChar: false },
        { time: 20000, text: "to ferry 'fore you count all your coins", flash: false, showChar: false },
        { time: 21500, text: "Others will <span class='color-blue'>comfort</span> saying", flash: false, showChar: false },
        { time: 23000, text: "they've seen hell and back - Oh really?", flash: true, showChar: false },
        { time: 25000, text: "Well in this game of glee", flash: false, showChar: false },
        { time: 26500, text: "Turns out the <span class='color-red'>losers</span> make them always", flash: false, showChar: false },
        { time: 28500, text: "", flash: false, showChar: false }
    ];

    const playBtn = document.getElementById('play-btn');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const glow = document.getElementById('glow');
    // MODIFIED: 'character' variable is no longer needed

    let startTime;
    let animationFrame;

    function startVideo() {
        playBtn.style.display = 'none';
        startTime = Date.now();
        updateFrame();
    }

    function updateFrame() {
        const currentTime = Date.now() - startTime;
        
        // Find the current lyric line based on time
        let currentLine = lyricTimeline[0];
        for (let i = lyricTimeline.length - 1; i >= 0; i--) {
            if (currentTime >= lyricTimeline[i].time) {
                currentLine = lyricTimeline[i];
                break;
            }
        }

        // Update DOM elements
        lyricsDisplay.innerHTML = currentLine.text;
        
        // Handle red background pulsing/flashing
        if (currentLine.flash) {
            glow.classList.add('pulse');
        } else {
            glow.classList.remove('pulse');
            glow.style.opacity = '0';
        }

        // MODIFIED: The code to show/hide the character is removed.

        // Loop until the end of the timeline
        if (currentTime < lyricTimeline[lyricTimeline.length - 1].time) {
            animationFrame = requestAnimationFrame(updateFrame);
        } else {
            // Reset when done
            playBtn.style.display = 'block';
            playBtn.innerText = "Replay Scene";
            lyricsDisplay.innerHTML = "";
            // MODIFIED: The character is no longer relevant for the reset
        }
    }

    playBtn.addEventListener('click', startVideo);
</script>

</body>
</html>
