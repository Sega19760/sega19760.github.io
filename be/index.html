<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lord X</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Times New Roman', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        /* UPDATED BACKGROUND IMAGE */
        background: black url("https://i.imgur.com/e5BCbUe.png") no-repeat center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; 
    }

    .core-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 150px; height: 150px;
        background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        z-index: 2;
        opacity: 0;
        transition: opacity 0.1s;
    }
    
    .pulse { animation: heartbeat 0.5s infinite alternate; }

    @keyframes heartbeat {
        from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* UPDATED LYRICS DISPLAY */
    #lyrics-display {
        position: absolute;
        bottom: 30px; /* MOVED LOWER */
        z-index: 10;
        font-size: 46px;
        text-align: center;
        width: 100%;
        letter-spacing: 1px;
        /* Ghostly, barely visible text for un-sung syllables */
        color: rgba(20, 20, 20, 0.8); 
        text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.15);
    }

    /* The class added when a syllable is "hit" */
    .lit {
        color: white;
        text-shadow: 2px 2px 4px black;
        transition: color 0.1s;
    }

    /* Colors only apply if the syllable is also lit */
    .color-blue.lit { color: #88ccff; text-shadow: 0 0 8px #88ccff, 2px 2px 4px black; }
    .color-red.lit { color: #ff3333; text-shadow: 0 0 8px #ff3333, 2px 2px 4px black; }
    
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: none;
    }
    #play-btn:hover { background-color: red; }

    /* DEBUG PANEL */
    #debug-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 100;
        background-color: rgba(0, 0, 0, 0.85);
        border: 2px solid #555;
        padding: 15px;
        border-radius: 8px;
        font-family: sans-serif;
        display: none; 
        flex-direction: column;
        gap: 10px;
        width: 400px;
    }
    #debug-panel h3 { margin: 0; color: #ff3333; }
    #sync-status { font-size: 16px; font-weight: bold; color: yellow; }
    #export-area {
        width: 100%;
        height: 150px;
        background: #111;
        color: #0f0;
        font-family: monospace;
        border: 1px solid #444;
        display: none;
    }
    .debug-btn { padding: 8px; background: #333; color: white; border: 1px solid #666; cursor: pointer; }
    .debug-btn:hover { background: #555; }
    #ytplayer { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; }
</style>
</head>
<body>

<div id="video-container">
    <div id="ytplayer"></div>

    <div id="debug-panel">
        <h3>Syllable Sync Tool</h3>
        <button id="start-sync-btn" class="debug-btn">1. Start Sync (Tap Space for EACH word!)</button>
        <div id="sync-status">Status: Waiting to start...</div>
        <button id="export-btn" class="debug-btn" style="display:none;">2. Export Code</button>
        <textarea id="export-area"></textarea>
    </div>

    <div id="glow" class="core-glow"></div>
    <div id="lyrics-display"></div>
    <button id="play-btn">Loading Audio...</button>
</div>

<script>
    // --- THIS IS YOUR WORKBENCH ---
    // Use the "|" symbol to tell the engine where to split the syllables or words.
    // ADD THE REST OF THE SONG TO THIS ARRAY!
const unsyncedLyrics = [
    { raw: "", flash: false },
    { raw: "Tec|ton|ic |tri|bu|la|tions", flash: true },
    { raw: "Sick|ness |that |sweeps |the |na|tions", flash: false },
    { raw: "Be|yond |these |ti|ny |things |just", flash: false },
    { raw: "Some|thin' |tells |me |this |is |dee|per", flash: true },
    { raw: "Our |minds |are |spe|cial |for|ces", flash: false },
    { raw: "Bo|dy |bags |that |co|ver |corp|ses", flash: false },
    { raw: "Let |it |make |some |sense |to |me |that", flash: true },
    { raw: "There's |a |rea|son |I |could|n't |keep |her", flash: false },
    { raw: "I |could|n't |see.. |I |could|n't've |seen |it!", flash: false },
    { raw: "There's |no|thin' |left, |but |I |can't |just |leave |her |be, |no!", flash: true },
    { raw: "You |cast |your |sight |on |dreams |to |fer|ry |‘fore |you |count |all |your |coins", flash: false },
    { raw: "O|thers |will |com|fort |say|ing |they’ve |seen |hell |and |back |— |Oh |real|ly?", flash: false },
    { raw: "Well |in |this |game |of |glee, |turns |out |the |lo|sers |make |them |al|ways", flash: false },
    { raw: "I |should’ve |stopped |be|fore |I |star|ted, |and |thought |— |“How |sil|ly!”", flash: true },
    { raw: "What |could |it |be? |What |could |it |be!?", flash: false },
    { raw: "I |JUST |CAN'T |TAKE |IT |A|NY|MORE!", flash: true },
    { raw: "Played |off |the |fun|da|men|tals", flash: false },
    { raw: "For |in |the |mo|ment |we |must", flash: false },
    { raw: "But |it’s |in|con|se|quen|tial", flash: false },
    { raw: "The |norm |is |not |for |both |of |us", flash: false },
    { raw: "She |thinks |it’s |for |the |bet|ter", flash: false },
    { raw: "But |I |still |know |how |she |lies", flash: false },
    { raw: "When |past |a|po|ca|lypse |she’d |spread |her |false|hood |from |the |o|ther |side", flash: false },
    { raw: "And |since |our |part, |it’s |ea|ten |my |heart, |girl", flash: false },
    { raw: "Where’s |all |the |fun, |when |I |TEAR |THEIR |BODS |A|PART, |NOW", flash: true },
    { raw: "You |throw |dis|cre|tion |out |the |win|dow |when |you |try |to |be |kind", flash: false },
    { raw: "But |once |they |leave |your |zone |you’re |sit|tin |in |the |cold |— |it’s |chil|lin’!", flash: false },
    { raw: "You |pon|der, |pi|ning |what |may |hap|pen, |or |who |could |be |the |next", flash: false },
    { raw: "I |should’ve |stopped |be|fore |I |star|ted, |and |thought |— |“How |sil|ly!”", flash: true },
    { raw: "What |could |it |be? |What |could |it |be!?", flash: false },
    { raw: "I |JUST |CAN'T |TAKE |IT |A|NY|MORE!", flash: true },
    { raw: "You |cast |your |sight |on |dreams |to |fer|ry |‘fore |you |count |all |your |coins", flash: false },
    { raw: "O|thers |will |com|fort |say|ing |they’ve |seen |hell |and |back |— |Oh |real|ly?", flash: false },
    { raw: "Well |in |this |game |of |glee, |turns |out |the |lo|sers |still |made |the |choice", flash: false },
    { raw: "I |should’ve |stopped |be|fore |I |star|ted, |and |thought |— |“How |sil|ly!”", flash: true },
    { raw: "I |knew |my|self |well |‘fore |this |flow|er |took |to |me |for |ten|ding", flash: false },
    { raw: "So |what’s |the |point |with |just |the |blood |for |wa|ter|ing |— |So |tea|ry!", flash: false },
    { raw: "But |still |it |wilts |a|way, |and |of |the |two, |it’s |wil|tin’ |slow|ly", flash: false },
    { raw: "I |stand |here |dead |and |done, |and |I |have |to |ask: |What’s |kil|lin‘ |me?", flash: true },
    { raw: "What |could |it |be? |What |could |it |be? |I |could|n’t |see |Or |was |it |me |Who |cut |us |free? |What |could |it |be?", flash: false },
    { raw: "I |just |can’t |take |it |a|ny |moo|o|o|ooore", flash: true }
];

    // This array will hold the final synced data
    let lyricTimeline = [];

    const playBtn = document.getElementById('play-btn');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const glow = document.getElementById('glow');
    
    let isSyncMode = false;
    let syncLineIndex = 1; 
    let syncChunkIndex = 0;
    
    let player;
    let animationFrame;

    // --- YOUTUBE API SETUP ---
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
            height: '1',
            width: '1',
            videoId: '6fk50hiAYTQ',
            playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        document.title = "Ready to Play";
        playBtn.style.display = 'block';
        playBtn.innerText = "Play Empty Scene (Sync First!)";
        document.getElementById('debug-panel').style.display = 'flex'; 
        
        playBtn.addEventListener('click', () => {
            if(lyricTimeline.length === 0) {
                alert("You need to Sync the lyrics first using the Debug Panel!");
                return;
            }
            playBtn.style.display = 'none';
            player.seekTo(30); 
            player.playVideo();
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING && !isSyncMode) {
            updateFrame(); 
        } else if (event.data == YT.PlayerState.ENDED || event.data == YT.PlayerState.PAUSED) {
            cancelAnimationFrame(animationFrame);
            if (event.data == YT.PlayerState.ENDED && !isSyncMode) {
                playBtn.style.display = 'block';
                playBtn.innerText = "Replay Video";
                lyricsDisplay.innerHTML = "";
                glow.style.opacity = '0';
            }
        }
    }

    // --- ANIMATION ENGINE (Syllable Based) ---
    function updateFrame() {
        if (lyricTimeline.length === 0) return;
        const currentTime = player.getCurrentTime() * 1000;
        
        // 1. Find which line we are currently on
        let currentLine = lyricTimeline[0];
        for (let i = lyricTimeline.length - 1; i >= 0; i--) {
            if (currentTime >= lyricTimeline[i].lineStartTime) {
                currentLine = lyricTimeline[i];
                break;
            }
        }

        // 2. Build the HTML for the current line
        if (currentLine.chunks && currentLine.chunks.length > 0) {
            let lineHTML = "";
            currentLine.chunks.forEach(chunk => {
                // If the current time has passed this chunk's timestamp, light it up!
                if (currentTime >= chunk.time) {
                    // Inject the 'lit' class into the span if it has one, or wrap it
                    if(chunk.text.includes('<span')) {
                        lineHTML += chunk.text.replace("class='", "class='lit ");
                    } else {
                        lineHTML += `<span class='lit'>${chunk.text}</span>`;
                    }
                } else {
                    lineHTML += chunk.text; // Stays dark ghost text
                }
            });
            lyricsDisplay.innerHTML = lineHTML;
        } else {
            lyricsDisplay.innerHTML = ""; // Empty string clearing
        }
        
        if (currentLine.flash) glow.classList.add('pulse');
        else { glow.classList.remove('pulse'); glow.style.opacity = '0'; }

        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            animationFrame = requestAnimationFrame(updateFrame);
        }
    }

    // --- DEBUG & SYLLABLE SYNC LOGIC ---
    document.getElementById('start-sync-btn').addEventListener('click', () => {
        isSyncMode = true;
        syncLineIndex = 1; 
        syncChunkIndex = 0;
        
        // Setup the blank timeline based on unsyncedLyrics
        lyricTimeline = unsyncedLyrics.map((line, index) => {
            if (line.raw === "") {
                return { lineStartTime: 0, flash: false, chunks: [] };
            }
            const pieces = line.raw.split('|');
            const chunkObjects = pieces.map(p => ({ text: p, time: 0 }));
            return { lineStartTime: 0, flash: line.flash, chunks: chunkObjects };
        });
        
        lyricsDisplay.innerHTML = ""; 
        playBtn.style.display = 'none';
        
        updateSyncStatus();
        document.getElementById('export-btn').style.display = 'none';
        document.getElementById('export-area').style.display = 'none';

        player.seekTo(30);
        player.playVideo();
    });

    function updateSyncStatus() {
        const line = lyricTimeline[syncLineIndex];
        if (!line || line.chunks.length === 0) {
            document.getElementById('sync-status').innerHTML = `Sync Complete!`;
            return;
        }
        const nextSyllable = line.chunks[syncChunkIndex].text.replace(/<[^>]*>?/gm, '');
        document.getElementById('sync-status').innerHTML = `Press Space for:<br><span style="font-size:24px; color:white;">"${nextSyllable}"</span>`;
        
        // Preview the line on screen so you can see your progress while tapping
        let previewHTML = "";
        line.chunks.forEach((c, idx) => {
            if (idx < syncChunkIndex) {
                if(c.text.includes('<span')) previewHTML += c.text.replace("class='", "class='lit ");
                else previewHTML += `<span class='lit'>${c.text}</span>`;
            } else {
                previewHTML += c.text;
            }
        });
        lyricsDisplay.innerHTML = previewHTML;
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && isSyncMode) {
            e.preventDefault(); 
            const exactTimeMs = Math.round(player.getCurrentTime() * 1000);
            
            const currentLine = lyricTimeline[syncLineIndex];

            // If this is the first chunk of the line, set the line's start time
            if (syncChunkIndex === 0) {
                currentLine.lineStartTime = exactTimeMs;
            }

            // Set the time for the specific chunk/syllable
            currentLine.chunks[syncChunkIndex].time = exactTimeMs;
            
            // Screen flash feedback
            document.body.style.backgroundColor = '#200';
            setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 50);

            // Move to next syllable
            syncChunkIndex++;

            // If we finished all syllables in this line, move to next line
            if (syncChunkIndex >= currentLine.chunks.length) {
                syncLineIndex++;
                syncChunkIndex = 0;
                lyricsDisplay.innerHTML = ""; // clear between lines
                
                // Skip empty lines
                if(syncLineIndex < lyricTimeline.length && lyricTimeline[syncLineIndex].chunks.length === 0) {
                    lyricTimeline[syncLineIndex].lineStartTime = exactTimeMs + 100; // arbitrary future time to trigger clear
                    syncLineIndex++;
                }
            }

            if (syncLineIndex < lyricTimeline.length) {
                updateSyncStatus();
            } else {
                document.getElementById('sync-status').innerHTML = `Sync Complete!`;
                player.pauseVideo();
                isSyncMode = false;
                document.getElementById('export-btn').style.display = 'block';
            }
        }
    });

    document.getElementById('export-btn').addEventListener('click', () => {
        let output = "const lyricTimeline = [\n";
        
        lyricTimeline.forEach((line, index) => {
            const isLast = index === lyricTimeline.length - 1;
            if (line.chunks.length === 0) {
                output += `    { lineStartTime: ${line.lineStartTime}, flash: false, chunks: [] }${isLast ? '' : ','}\n`;
            } else {
                output += `    {\n      lineStartTime: ${line.lineStartTime}, \n      flash: ${line.flash}, \n      chunks: [\n`;
                line.chunks.forEach((chunk, cIndex) => {
                    const cLast = cIndex === line.chunks.length - 1;
                    // Escape quotes if necessary
                    const safeText = chunk.text.replace(/"/g, '\\"');
                    output += `        { text: "${safeText}", time: ${chunk.time} }${cLast ? '' : ','}\n`;
                });
                output += `      ]\n    }${isLast ? '' : ','}\n`;
            }
        });
        
        output += "];";
        
        const textArea = document.getElementById('export-area');
        textArea.value = output;
        textArea.style.display = 'block';
        textArea.select();
    });

</script>
</body>
</html>
