<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waiting for audio...</title>
<style>
    /* Reset and base setup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Times New Roman', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Video Container */
    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        background: black url("https://i.imgur.com/e5BCbUe.png") no-repeat center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; 
    }
    
    /* Lyrics display at the bottom */
    #lyrics-display {
        position: absolute;
        bottom: 80px;
        z-index: 10;
        font-size: 42px;
        text-align: center;
        width: 100%;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
    }

    /* Specific text colors used in the video */
    .color-blue { color: #88ccff; text-shadow: 0 0 8px #88ccff, 2px 2px 4px black; }
    .color-red { color: #ff3333; text-shadow: 0 0 8px #ff3333, 2px 2px 4px black; }
    
    /* Play Button */
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: none; /* Hidden until YouTube API loads */
    }
    #play-btn:hover { background-color: red; }
    
    /* Hide the actual YouTube iframe */
    #ytplayer {
        position: absolute;
        top: -9999px;
        left: -9999px;
        width: 1px;
        height: 1px;
    }

</style>
</head>
<body>

<div id="video-container">
    <div id="ytplayer"></div>

    <div id="glow" class="core-glow"></div>
    <div id="lyrics-display"></div>
    <button id="play-btn">Loading Audio...</button>
</div>

<script>
    const lyricTimeline = [
        { time: 0, text: "", flash: false },
        { time: 33000, text: "Tectonic tribulations", flash: true },
        { time: 34500, text: "Sickness that sweeps the nations", flash: false },
        { time: 36000, text: "Beyond these tiny things just", flash: false },
        { time: 37500, text: "Somethin' tells me this is deeper", flash: true },
        { time: 39000, text: "Our minds are <span class='color-blue'>special forces</span>", flash: false },
        { time: 40500, text: "Body bags that cover corpses", flash: false },
        { time: 42000, text: "Let it make some sense to me that", flash: true },
        { time: 43500, text: "There's a reason I couldn't keep her", flash: false },
        { time: 45000, text: "I couldn't see...", flash: false },
        { time: 46500, text: "I couldn't've seen it!", flash: true },
        { time: 48000, text: "There's nothin' left, but", flash: false },
        { time: 49000, text: "I can't just leave her be, no!", flash: false },
        { time: 50500, text: "You cast <span class='color-blue'>your sight</span> on dreams", flash: true },
        { time: 52000, text: "to ferry 'fore you count all your coins", flash: false },
        { time: 53500, text: "Others will <span class='color-blue'>comfort</span> saying", flash: false },
        { time: 55000, text: "they've seen hell and back - Oh really?", flash: true },
        { time: 57000, text: "Well in this game of glee", flash: false },
        { time: 58500, text: "Turns out the <span class='color-red'>losers</span> make them always", flash: false },
        { time: 60500, text: "", flash: false }
    ];

    const playBtn = document.getElementById('play-btn');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const glow = document.getElementById('glow');
    
    let player;
    let animationFrame;

    // --- YOUTUBE API SETUP ---
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
            height: '1',
            width: '1',
            videoId: '6fk50hiAYTQ',
            playerVars: {
                'playsinline': 1,
                'controls': 0,
                'disablekb': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        document.title = "Ready to Play";
        playBtn.style.display = 'block';
        playBtn.innerText = "Start Lyric Scene";
        
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            document.title = "Playing...";
            player.seekTo(31); 
            player.playVideo();
        });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            updateFrame();
        } else if (event.data == YT.PlayerState.ENDED || event.data == YT.PlayerState.PAUSED) {
            cancelAnimationFrame(animationFrame);
            if (event.data == YT.PlayerState.ENDED) {
                playBtn.style.display = 'block';
                playBtn.innerText = "Replay Scene";
                lyricsDisplay.innerHTML = "";
                document.title = "Scene Ended";
                glow.style.opacity = '0';
            }
        }
    }

    // --- ANIMATION SYNC LOOP ---
    function updateFrame() {
        const currentTime = player.getCurrentTime() * 1000;
        
        let currentLine = lyricTimeline[0];
        for (let i = lyricTimeline.length - 1; i >= 0; i--) {
            if (currentTime >= lyricTimeline[i].time) {
                currentLine = lyricTimeline[i];
                break;
            }
        }

        // Update Text on Screen
        lyricsDisplay.innerHTML = currentLine.text;

        // Update Browser Tab Title
        if (currentLine.text === "") {
            document.title = "Lord X"; // Default title when there are no lyrics
        } else {
            // Strip out HTML tags (like <span class='color-blue'>) so the tab text is clean
            const cleanText = currentLine.text.replace(/<[^>]*>?/gm, '');
            document.title = cleanText;
        }
        
        // Handle red background pulsing/flashing
        if (currentLine.flash) {
            glow.classList.add('pulse');
        } else {
            glow.classList.remove('pulse');
            glow.style.opacity = '0';
        }

        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            animationFrame = requestAnimationFrame(updateFrame);
        }
    }
</script>

</body>
</html>
