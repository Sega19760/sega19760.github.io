<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What could it be?</title>
<style>
    /* Reset and base setup */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Times New Roman', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Video Container */
    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        background: black url("https://i.imgur.com/e5BCbUe.png") no-repeat center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; 
    }

    /* Glowing red core that pulses */
    .core-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 150px; height: 150px;
        background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        z-index: 2;
        opacity: 0;
        transition: opacity 0.1s;
    }
    
    .pulse {
        animation: heartbeat 0.5s infinite alternate;
    }

    @keyframes heartbeat {
        from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Lyrics display at the bottom */
    #lyrics-display {
        position: absolute;
        bottom: 80px;
        z-index: 10;
        font-size: 42px;
        text-align: center;
        width: 100%;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
    }

    /* Specific text colors used in the video */
    .color-blue { color: #88ccff; text-shadow: 0 0 8px #88ccff, 2px 2px 4px black; }
    .color-red { color: #ff3333; text-shadow: 0 0 8px #ff3333, 2px 2px 4px black; }
    
    /* Play Button */
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: none; /* Hidden until YouTube API loads */
    }
    #play-btn:hover { background-color: red; }
    
    /* Hide the actual YouTube iframe */
    #ytplayer {
        position: absolute;
        top: -9999px;
        left: -9999px;
        width: 1px;
        height: 1px;
    }

</style>
</head>
<body>

<div id="video-container">
    <div id="ytplayer"></div>

    <div id="glow" class="core-glow"></div>
    <div id="lyrics-display"></div>
    <button id="play-btn">Loading Audio...</button>
</div>

<script>
    const lyricTimeline = [
        { time: 0, text: "", flash: false },
        { time: 1000, text: "Tectonic tribulations", flash: true },
        { time: 2500, text: "Sickness that sweeps the nations", flash: false },
        { time: 4000, text: "Beyond these tiny things just", flash: false },
        { time: 5500, text: "Somethin' tells me this is deeper", flash: true },
        { time: 7000, text: "Our minds are <span class='color-blue'>special forces</span>", flash: false },
        { time: 8500, text: "Body bags that cover corpses", flash: false },
        { time: 10000, text: "Let it make some sense to me that", flash: true },
        { time: 11500, text: "There's a reason I couldn't keep her", flash: false },
        { time: 13000, text: "I couldn't see...", flash: false },
        { time: 14500, text: "I couldn't've seen it!", flash: true },
        { time: 16000, text: "There's nothin' left, but", flash: false },
        { time: 17000, text: "I can't just leave her be, no!", flash: false },
        { time: 18500, text: "You cast <span class='color-blue'>your sight</span> on dreams", flash: true },
        { time: 20000, text: "to ferry 'fore you count all your coins", flash: false },
        { time: 21500, text: "Others will <span class='color-blue'>comfort</span> saying", flash: false },
        { time: 23000, text: "they've seen hell and back - Oh really?", flash: true },
        { time: 25000, text: "Well in this game of glee", flash: false },
        { time: 26500, text: "Turns out the <span class='color-red'>losers</span> make them always", flash: false },
        { time: 28500, text: "", flash: false }
    ];

    const playBtn = document.getElementById('play-btn');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const glow = document.getElementById('glow');
    
    let player;
    let animationFrame;

    // --- YOUTUBE API SETUP ---
    // 1. Load the IFrame Player API code asynchronously.
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // 2. This function creates an <iframe> (and YouTube player) after the API code downloads.
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
            height: '1',
            width: '1',
            videoId: '6fk50hiAYTQ', // The Video ID from your URL
            playerVars: {
                'playsinline': 1,
                'controls': 0,
                'disablekb': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    // 3. The API will call this function when the video player is ready.
    function onPlayerReady(event) {
        playBtn.style.display = 'block';
        playBtn.innerText = "Start Lyric Scene";
        
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            player.seekTo(0);
            player.playVideo();
        });
    }

    // 4. The API calls this function when the player's state changes.
    function onPlayerStateChange(event) {
        // If the video starts playing (state 1), start the sync loop
        if (event.data == YT.PlayerState.PLAYING) {
            updateFrame();
        } else if (event.data == YT.PlayerState.ENDED || event.data == YT.PlayerState.PAUSED) {
            cancelAnimationFrame(animationFrame);
            if (event.data == YT.PlayerState.ENDED) {
                playBtn.style.display = 'block';
                playBtn.innerText = "Replay Scene";
                lyricsDisplay.innerHTML = "";
                glow.style.opacity = '0';
            }
        }
    }

    // --- ANIMATION SYNC LOOP ---
    function updateFrame() {
        // Get exact current time from the YouTube player (converted from seconds to milliseconds)
        const currentTime = player.getCurrentTime() * 1000;
        
        // Find the current lyric line based on time
        let currentLine = lyricTimeline[0];
        for (let i = lyricTimeline.length - 1; i >= 0; i--) {
            if (currentTime >= lyricTimeline[i].time) {
                currentLine = lyricTimeline[i];
                break;
            }
        }

        // Update DOM elements
        lyricsDisplay.innerHTML = currentLine.text;
        
        // Handle red background pulsing/flashing
        if (currentLine.flash) {
            glow.classList.add('pulse');
        } else {
            glow.classList.remove('pulse');
            glow.style.opacity = '0';
        }

        // Keep looping as long as the video is playing
        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
            animationFrame = requestAnimationFrame(updateFrame);
        }
    }
</script>

</body>
</html>
