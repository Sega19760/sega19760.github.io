<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What could it be?</title>
<style>
    @font-face {
        font-family: 'Merriweather';
        src: url('Merriweather.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: black;
        color: white;
        font-family: 'Merriweather', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    #video-container {
        position: relative;
        width: 1280px;
        height: 720px;
        background: black url("https://i.imgur.com/e5BCbUe.png") no-repeat center/cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
        border: 2px solid #222; 
    }

    .core-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 150px; height: 150px;
        background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        z-index: 2;
        opacity: 0;
        transition: opacity 0.1s;
    }
    
    .pulse { animation: heartbeat 0.5s infinite alternate; }

    @keyframes heartbeat {
        from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    }

    #lyrics-wrapper {
        position: absolute;
        bottom: 30px;
        width: 90%;
        display: flex;
        justify-content: center;
        z-index: 10;
    }

    #lyrics-display {
        font-size: 46px;
        text-align: center;
        white-space: nowrap;
        letter-spacing: 1px;
        /* The Unlit State (Dark Grey) */
        color: #555; 
        text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
        transform-origin: center;
        transition: transform 0.1s;
    }

    /* The Lit State (White) */
    .lit {
        color: white !important;
        text-shadow: 2px 2px 4px black;
    }
    
    #play-btn {
        position: absolute;
        z-index: 20;
        padding: 15px 30px;
        font-size: 20px;
        background-color: rgba(255,0,0,0.7);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: none;
    }
    #play-btn:hover { background-color: red; }

    #debug-panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 100;
        background-color: rgba(0, 0, 0, 0.85);
        border: 2px solid #555;
        padding: 15px;
        border-radius: 8px;
        font-family: sans-serif;
        display: none; 
        flex-direction: column;
        gap: 10px;
        width: 400px;
        cursor: pointer;
    }
    #debug-panel h3 { margin: 0; color: #ff3333; }
    #sync-status { font-size: 16px; font-weight: bold; color: yellow; }
    #export-area {
        width: 100%;
        height: 150px;
        background: #111;
        color: #0f0;
        font-family: monospace;
        border: 1px solid #444;
        display: none;
        cursor: text;
    }
    .debug-btn { padding: 8px; background: #333; color: white; border: 1px solid #666; cursor: pointer; }
    .debug-btn:hover { background: #555; }
    #ytplayer { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; }
</style>
</head>
<body>

<div id="video-container">
    <div id="ytplayer"></div>
    <div id="debug-panel" onclick="this.style.display='none'">
        <h3>Syllable Sync Tool</h3>
        <button id="start-sync-btn" class="debug-btn">1. Start Sync (Tap Space!)</button>
        <div id="sync-status">Status: Waiting...</div>
        <button id="export-btn" class="debug-btn" style="display:none;">2. Export Code</button>
        <textarea id="export-area" onclick="event.stopPropagation()"></textarea>
    </div>
    <div id="glow" class="core-glow"></div>
    <div id="lyrics-wrapper"><div id="lyrics-display"></div></div>
    <button id="play-btn">Loading Audio...</button>
</div>

<script>
// Added " " (empty space) at the end of every line to allow for one final tap
const unsyncedLyrics = [
    { raw: "", flash: false },
    { raw: "Tec|ton|ic |tri|bu|la|tions| ", flash: true },
    { raw: "Sick|ness |that |sweeps |the |na|tions| ", flash: false },
    { raw: "Be|yond |these |ti|ny |things |just| ", flash: false },
    { raw: "Some|thin' |tells |me |this |is |dee|per| ", flash: true },
    { raw: "Our |minds |are |spe|cial |for|ces| ", flash: false },
    { raw: "Bo|dy |bags |that |co|ver |corp|ses| ", flash: false },
    { raw: "Let |it |make |some |sense |to |me |that| ", flash: true },
    { raw: "There's |a |rea|son |I |could|n't |keep |her| ", flash: false },
    { raw: "I |could|n't |see.. |I |could|n't've |seen |it!| ", flash: false },
    { raw: "There's |no|thin' |left, |but |I |can't |just |leave |her |be, |no!| ", flash: true },
    { raw: "You |cast |your |sight |on |dreams |to |fer|ry |‘fore |you |count |all |your |coins| ", flash: false },
    { raw: "O|thers |will |com|fort |say|ing |they’ve |seen |hell |and |back |— |Oh |real|ly?| ", flash: false },
    { raw: "Well |in |this |game |of |glee, |turns |out |the |lo|sers |make |them |al|ways| ", flash: false },
    { raw: "I |should’ve |stopped |be|fore |I |star|ted, |and |thought |— |“How |sil|ly!”| ", flash: true },
    { raw: "What |could |it |be? |What |could |it |be!?| ", flash: false },
    { raw: "I |JUST |CAN'T |TAKE |IT |A|NY|MORE!| ", flash: true },
    { raw: "Played |off |the |fun|da|men|tals| ", flash: false },
    { raw: "For |in |the |mo|ment |we |must| ", flash: false },
    { raw: "But |it’s |in|con|se|quen|tial| ", flash: false },
    { raw: "The |norm |is |not |for |both |of |us| ", flash: false },
    { raw: "She |thinks |it’s |for |the |bet|ter| ", flash: false },
    { raw: "But |I |still |know |how |she |lies| ", flash: false },
    { raw: "When |past |a|po|ca|lypse |she’d |spread |her |false|hood |from |the |o|ther |side| ", flash: false },
    { raw: "And |since |our |part, |it’s |ea|ten |my |heart, |girl| ", flash: false },
    { raw: "Where’s |all |the |fun, |when |I |TEAR |THEIR |BODS |A|PART, |NOW| ", flash: true },
    { raw: "You |throw |dis|cre|tion |out |the |win|dow |when |you |try |to |be |kind| ", flash: false },
    { raw: "But |once |they |leave |your |zone |you’re |sit|tin |in |the |cold |— |it’s |chil|lin’!| ", flash: false },
    { raw: "You |pon|der, |pi|ning |what |may |hap|pen, |or |who |could |be |the |next| ", flash: false },
    { raw: "I |should’ve |stopped |be|fore |I |star|ted, |and |thought |— |“How |sil|ly!”| ", flash: true },
    { raw: "What |could |it |be? |What |could |it |be!?| ", flash: false },
    { raw: "I |JUST |CAN'T |TAKE |IT |A|NY|MORE!| ", flash: true },
    { raw: "You |cast |your |sight |on |dreams |to |fer|ry |‘fore |you |count |all |your |coins| ", flash: false },
    { raw: "O|thers |will |com|fort |say|ing |they’ve |seen |hell |and |back |— |Oh |real|ly?| ", flash: false },
    { raw: "Well |in |this |game |of |glee, |turns |out |the |lo|sers |still |made |the |choice| ", flash: false },
    { raw: "I |should’ve |stopped |be|fore |I |star|ted, |and |thought |— |“How |sil|ly!”| ", flash: true },
    { raw: "I |knew |my|self |well |‘fore |this |flow|er |took |to |me |for |ten|ding| ", flash: false },
    { raw: "So |what’s |the |point |with |just |the |blood |for |wa|ter|ing |— |So |tea|ry!| ", flash: false },
    { raw: "But |still |it |wilts |a|way, |and |of |the |two, |it’s |wil|tin’ |slow|ly| ", flash: false },
    { raw: "I |stand |here |dead |and |done, |and |I |have |to |ask: |What’s |kil|lin‘ |me?| ", flash: true },
    { raw: "What |could |it |be? |What |could |it |be? |I |could|n’t |see |Or |was |it |me |Who |cut |us |free? |What |could |it |be?| ", flash: false },
    { raw: "I |just |can’t |take |it |a|ny |moo|o|o|ooore| ", flash: true }
];

// --- TRIGGER & SCALING ---
let keySequence = "";
window.addEventListener('keydown', (e) => {
    keySequence += e.key.toLowerCase();
    if (keySequence.length > 4) keySequence = keySequence.slice(-4);
    if (keySequence === "sega") document.getElementById('debug-panel').style.display = 'flex';
});

function adjustTextScale() {
    const display = document.getElementById('lyrics-display');
    const container = document.getElementById('video-container');
    display.style.transform = 'scale(1)'; 
    if (display.offsetWidth > container.offsetWidth * 0.9) {
        const scale = (container.offsetWidth * 0.9) / display.offsetWidth;
        display.style.transform = `scale(${scale})`;
    }
}

// --- LOGIC ---
let lyricTimeline = [];
let player, animationFrame, isSyncMode = false, syncLineIndex = 1, syncChunkIndex = 0;

const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytplayer', { height: '1', width: '1', videoId: '6fk50hiAYTQ', playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1 }, events: { 'onReady': onPlayerReady } });
}

function onPlayerReady() {
    document.getElementById('play-btn').style.display = 'block';
    document.getElementById('play-btn').innerText = "Play Empty Scene (Sync First!)";
    document.getElementById('play-btn').addEventListener('click', () => { 
        if(lyricTimeline.length === 0) return alert("Sync first!");
        document.getElementById('play-btn').style.display = 'none';
        player.seekTo(0); player.playVideo(); updateFrame();
    });
}

function updateFrame() {
    if (lyricTimeline.length === 0) return;
    const currentTime = player.getCurrentTime() * 1000;
    
    let activeLineIndex = -1;
    for (let i = 0; i < lyricTimeline.length; i++) {
        if (currentTime >= lyricTimeline[i].lineStartTime) activeLineIndex = i;
    }

    let nextLineStartTime = (activeLineIndex !== -1 && activeLineIndex + 1 < lyricTimeline.length) 
                            ? lyricTimeline[activeLineIndex + 1].lineStartTime 
                            : Infinity;

    let currentLine = (activeLineIndex !== -1 && currentTime < nextLineStartTime) ? lyricTimeline[activeLineIndex] : null;
    
    if (currentLine) {
        let lineHTML = "";
        currentLine.chunks.forEach(chunk => {
            // ONLY add .lit if time is passed
            if (currentTime >= chunk.time) {
                lineHTML += `<span class='lit'>${chunk.text}</span>`;
            } else {
                lineHTML += `<span>${chunk.text}</span>`;
            }
        });
        document.getElementById('lyrics-display').innerHTML = lineHTML;
        adjustTextScale();
        
        if (currentLine.flash) document.getElementById('glow').classList.add('pulse');
        else document.getElementById('glow').classList.remove('pulse');
    } else {
        document.getElementById('lyrics-display').innerHTML = "";
        document.getElementById('glow').classList.remove('pulse');
    }
    if (player.getPlayerState() === 1) animationFrame = requestAnimationFrame(updateFrame);
}

document.getElementById('start-sync-btn').addEventListener('click', () => {
    isSyncMode = true; syncLineIndex = 1; syncChunkIndex = 0;
    lyricTimeline = unsyncedLyrics.map(line => ({ lineStartTime: 0, flash: line.flash, chunks: line.raw.split('|').map(p => ({ text: p, time: 0 })) }));
    player.seekTo(30); player.playVideo(); updateSyncStatus();
});

function updateSyncStatus() {
    const line = lyricTimeline[syncLineIndex];
    if (!line) return;
    
    let previewHTML = "";
    line.chunks.forEach((c, idx) => {
        // Only light up if we have passed this chunk in sync mode
        if (idx < syncChunkIndex) previewHTML += `<span class='lit'>${c.text}</span>`;
        else previewHTML += `<span>${c.text}</span>`;
    });
    
    document.getElementById('lyrics-display').innerHTML = previewHTML;
    adjustTextScale();
    document.getElementById('sync-status').innerText = `Press Space for: "${line.chunks[syncChunkIndex].text.replace(/<[^>]*>?/gm, '')}"`;
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && isSyncMode) {
        const time = Math.round(player.getCurrentTime() * 1000);
        if (syncChunkIndex === 0) lyricTimeline[syncLineIndex].lineStartTime = time;
        lyricTimeline[syncLineIndex].chunks[syncChunkIndex].time = time;
        
        syncChunkIndex++;
        if (syncChunkIndex >= lyricTimeline[syncLineIndex].chunks.length) { 
            syncLineIndex++; 
            syncChunkIndex = 0; 
        }
        
        if (syncLineIndex >= lyricTimeline.length) { 
            isSyncMode = false; 
            document.getElementById('export-btn').style.display = 'block';
            document.getElementById('sync-status').innerText = "Sync Complete!";
        } else {
            updateSyncStatus();
        }
    }
});

document.getElementById('export-btn').addEventListener('click', () => {
    const textArea = document.getElementById('export-area');
    textArea.value = JSON.stringify(lyricTimeline, null, 2);
    textArea.style.display = 'block';
});
</script>
</body>
</html>
