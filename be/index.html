function fitLyrics() {
    const wrapper = document.getElementById("lyrics-wrapper");
    const display = document.getElementById("lyrics-display");

    // Reset to base state to measure accurately
    display.style.transform = "scale(1)";

    // Use requestAnimationFrame so we get the accurate width of the container
    requestAnimationFrame(() => {
        const maxWidth = wrapper.clientWidth;
        const width = display.scrollWidth;

        if (width > maxWidth && maxWidth > 0) {
            const scale = maxWidth / width;
            // Use scale3d for hardware acceleration, which reduces jitter
            display.style.transform = `scale3d(${scale}, ${scale}, 1)`;
        } else {
            display.style.transform = "scale3d(1, 1, 1)";
        }
    });
}

    document.getElementById('play-btn').onclick = async function () {
    this.remove();
    music.currentTime = 0;
    await music.play();

    function loop() {
        const t = music.currentTime;
        const ms = t * 1000;

        const line = lyricTimeline.find((l, i) => 
            ms >= l.lineStartTime && (lyricTimeline[i + 1] ? ms < lyricTimeline[i + 1].lineStartTime : true)
        );

        // Lyrics Logic (Single instance, handles updates and sizing)
        if (line) {
            let html = "";
            line.chunks.forEach(c => {
                html += `<span class="${ms >= c.time ? "lit" : ""}">${c.text}</span>`;
            });

            if (display.innerHTML !== html) {
                display.innerHTML = html;
                fitLyrics();
            }
        } else {
            display.innerHTML = "";
        }

        // Background Opacity logic
        if (t <= 2) s.style.opacity = 1;
        else if (t <= 9) s.style.opacity = 1 - (t - 2) / 7;
        else s.style.opacity = 0;

        let o = 0;
        if (t >= 17 && t < 18) o = t - 17;
        else if (t >= 18 && t < 130.934) o = 1;
        else if (t >= 130.934 && t < 131.934) o = 1 - (t - 130.934);
        else if (t >= 151.004 && t < 152.004) o = t - 151.004;
        else if (t >= 152.004) o = 1;
        f.style.opacity = Math.max(0, Math.min(1, o));

        if (!music.paused && !music.ended) requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
};
