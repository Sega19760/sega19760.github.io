<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinister Minds</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#player {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
}
</style>
</head>

<body>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const videos = [
    "fsmOSNoCluk",
    "2SwjYXVA-bs",
    "C55x91kfpO0",
    "6fk50hiAYTQ",
    "T1UmfI7yo6k",
    "MGZwAMbrPow",
    "uVrQ_5ySse8",
    "r4RzMkHnGDQ",
    "iNiU6ObaOjg",
    "TpAK7ESNgtA",
    "RF0dG9OWUgc",
    "e7Xtb9M5WhA",
    "9qtrMpyRWpM",
    "u23qTvV0KV8",
    "ytFANKi2Y54",
    "q1hXAw__bgc",
    "NOKM37j9Ut8",
    "7uVckZRf2RE",
    "gJMtNR-ke0I",
];

let player;
let queue = [];
let currentIndex = 0;

function shuffle(array) {
    const arr = [...array];

    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    return arr;
}

function reshuffle() {
    queue = shuffle(videos);

    if (
        player &&
        queue.length > 1 &&
        queue[0] === player.getVideoData().video_id
    ) {
        [queue[0], queue[1]] = [queue[1], queue[0]];
    }

    currentIndex = 0;
}

function playNext() {
    if (currentIndex >= queue.length) {
        reshuffle();
    }

    player.loadVideoById(queue[currentIndex]);
    currentIndex++;
}

function onYouTubeIframeAPIReady() {
    reshuffle();

    player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: queue[currentIndex++],
        playerVars: {
            autoplay: 1,
            controls: 0,
            disablekb: 1,
            modestbranding: 1,
            rel: 0,
            fs: 0
        },
        events: {
            onStateChange(event) {
                if (event.data === YT.PlayerState.ENDED) {
                    playNext();
                }
            }
        }
    });
}
</script>

</body>
</html>
